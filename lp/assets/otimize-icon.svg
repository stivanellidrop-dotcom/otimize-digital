<svg xmlns="http://www.w3.org/2000/svg" viewBox="-240 -180 480 360" width="120" height="90">
  <defs>
    <style>
      .brain-solid { fill: #00E676; }
      .brain-circuit { fill: none; stroke: #00E676; stroke-width: 8; stroke-linecap: round; }
      .brain-node { fill: #00E676; }
    </style>
  </defs>

  <path class="brain-solid" d="M -150 -120 C -200 -90 -220 -30 -200 30 C -210 70 -190 110 -150 120 C -120 140 -80 130 -50 110 L -10 110 L -10 -120 L -50 -130 C -90 -140 -120 -135 -150 -120 Z"/>

  <g class="brain-circuit">
    <path d="M 10 -120 C 60 -130 100 -130 140 -115 C 180 -100 210 -70 215 -30 C 225 10 215 50 195 80 C 175 115 130 130 90 130 C 50 130 25 120 10 110 Z"/>
    <line x1="30" y1="-80" x2="80" y2="-90"/>
    <line x1="80" y1="-90" x2="130" y2="-70"/>
    <line x1="130" y1="-70" x2="170" y2="-30"/>
    <line x1="50" y1="-30" x2="100" y2="-10"/>
    <line x1="100" y1="-10" x2="150" y2="-20"/>
    <line x1="60" y1="40" x2="120" y2="50"/>
    <line x1="120" y1="50" x2="170" y2="30"/>
    <line x1="40" y1="80" x2="90" y2="90"/>
    <line x1="90" y1="90" x2="140" y2="80"/>
    <line x1="30" y1="-80" x2="20" y2="-40"/>
    <line x1="20" y1="-40" x2="50" y2="-30"/>
    <line x1="100" y1="-10" x2="120" y2="30"/>
  </g>

  <g class="brain-node">
    <circle cx="30" cy="-80" r="7"/>
    <circle cx="80" cy="-90" r="7"/>
    <circle cx="130" cy="-70" r="7"/>
    <circle cx="170" cy="-30" r="7"/>
    <circle cx="50" cy="-30" r="7"/>
    <circle cx="100" cy="-10" r="7"/>
    <circle cx="150" cy="-20" r="7"/>
    <circle cx="60" cy="40" r="7"/>
    <circle cx="120" cy="50" r="7"/>
    <circle cx="170" cy="30" r="7"/>
    <circle cx="40" cy="80" r="7"/>
    <circle cx="90" cy="90" r="7"/>
    <circle cx="140" cy="80" r="7"/>
    <circle cx="20" cy="-40" r="7"/>
  </g>
</svg>
